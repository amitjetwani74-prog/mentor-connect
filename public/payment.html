<!DOCTYPE html>
<html>
<head>

<title>Payment</title>
<link rel="stylesheet" href="css/payment.css">

</head>

<body>

<div class="payment-container">

<h2>Complete Payment</h2>

<p class="details">
Mentor: <span id="mentor"></span>
</p>

<p class="details">
Session Duration: <span id="duration"></span>
</p>

<p class="amount">
Amount to Pay: ₹<span id="price"></span>
</p>

<button onclick="location.href='success.html'">
Pay Now
</button>

</div>


<script>

window.onload = function(){

document.getElementById("mentor").innerText =
localStorage.getItem("mentorName")

document.getElementById("duration").innerText =
localStorage.getItem("duration")

document.getElementById("price").innerText =
localStorage.getItem("price")

}

</script>

</body>
</html>
