<!DOCTYPE html>
<html>

<head>
<title>Explore Mentors</title>
<link rel="stylesheet" href="css/mentor.css">
</head>

<body>

<h1 class="page-title">Explore Mentors</h1>

<div class="search-bar">
<input id="searchInput" type="text" placeholder="Search by name, role, or skill">
</div>

<div class="filters">
<button onclick="filterMentors('all')">All Mentors</button>
<button onclick="filterMentors('uiux')">UI/UX</button>
<button onclick="filterMentors('backend')">Backend</button>
<button onclick="filterMentors('frontend')">Frontend</button>
</div>


<!-- JS mentors will load here -->

<div class="mentor-container" id="mentorGrid"></div>


<!-- POPUP -->

<div id="mentorPopup" class="popup">

<div class="popup-content">

<span class="close" onclick="closePopup()">✖</span>

<h2 id="popupName"></h2>

<p id="popupRole"></p>

<p id="popupExp"></p>

<p><b>Skills:</b> <span id="popupSkills"></span></p>

<button class="book-btn">Book Session</button>

</div>

</div>


<script src="js/mentors.js"></script>

</body>
</html>
