<!DOCTYPE html>
<html>

<head>
<title>Explore Mentors</title>
<link rel="stylesheet" href="css/mentor.css">
</head>

<body>

<h1 class="page-title">Explore Mentors</h1>

<div class="search-bar">
<input id="searchInput" type="text" placeholder="Search by name, role, or skill">
</div>

<!-- FILTERS -->

<div class="filters">
<button onclick="filterMentors('all')">All Mentors</button>
<button onclick="filterMentors('uiux')">UI/UX</button>
<button onclick="filterMentors('backend')">Backend</button>
<button onclick="filterMentors('product')">Product</button>
<button onclick="filterMentors('growth')">Growth</button>
</div>


<div class="mentor-container" id="mentorList">

<!-- Mentor 1 -->

<div class="mentor-card" data-skill="uiux">

<img class="mentor-img" src="https://randomuser.me/api/portraits/men/32.jpg">

<div class="mentor-info">

<div class="mentor-name">Arjun Mehta</div>
<div class="rating">⭐ 4.9</div>

<div class="mentor-role">Senior UI/UX Designer</div>
<div class="mentor-company">Google • 8+ years exp.</div>

<div class="tags">
<span class="tag">Figma</span>
<span class="tag">Prototyping</span>
</div>

<div class="price">₹49 / 30 min</div>

<div class="card-buttons">
<button onclick="openPopup('Arjun Mehta','Senior UI/UX Designer','8 years experience','Figma, Prototyping')">View</button>
<button class="book-btn">Book Now</button>
</div>

</div>
</div>


<!-- Mentor 2 -->

<div class="mentor-card" data-skill="backend">

<img class="mentor-img" src="https://randomuser.me/api/portraits/women/45.jpg">

<div class="mentor-info">

<div class="mentor-name">Priya Sharma</div>
<div class="rating">⭐ 5.0</div>

<div class="mentor-role">Lead Backend Engineer</div>
<div class="mentor-company">Microsoft • 6+ years exp.</div>

<div class="tags">
<span class="tag">Node.js</span>
<span class="tag">AWS</span>
</div>

<div class="price">₹49 / 30 min</div>

<div class="card-buttons">
<button onclick="openPopup('Priya Sharma','Lead Backend Engineer','6 years experience','Node.js, AWS')">View</button>
<button class="book-btn">Book Now</button>
</div>

</div>
</div>


</div>


<!-- POPUP -->

<div id="mentorPopup" class="popup">

<div class="popup-content">

<span class="close" onclick="closePopup()">✖</span>

<h2 id="popupName"></h2>

<p id="popupRole"></p>

<p id="popupExp"></p>

<p><b>Skills:</b> <span id="popupSkills"></span></p>

<button class="book-btn">Book Session</button>

</div>

</div>


<script src="js/mentors.js"></script>

</body>
</html>
