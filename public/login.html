<!DOCTYPE html>
<html>
<head>

<title>Login - MentorConnect</title>
<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="login-page">

<div class="login-header">

<div class="logo">
<img src="images/logo-icon.png">
<span>MentorConnect</span>
</div>

<a class="support">Support</a>

</div>


<div class="login-card">

<h2>Welcome Back</h2>
<p class="subtitle">Log in to continue your growth journey</p>


<div class="social-login">

<button class="google">
<img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
Google
</button>

<button class="linkedin">
<img src="https://cdn-icons-png.flaticon.com/512/174/174857.png">
LinkedIn
</button>

</div>


<div class="divider">
<span>OR CONTINUE WITH EMAIL</span>
</div>

<input id="loginEmail" type="email" placeholder="Enter your email">
<input id="loginPassword" type="password" placeholder="Enter your password">

<button class="login-btn" onclick="loginUser()">Login →</button>

<p class="signup-link">
Don’t have an account? <a href="signup.html">Sign up</a>
</p>

</div>


<div class="footer">

<a>Privacy Policy</a>
<a>Terms of Service</a>
<a>Cookies Settings</a>

</div>

</div>

<script>

function loginUser(){

let email = document.getElementById("loginEmail").value;
let password = document.getElementById("loginPassword").value;

/* validation */

if(email==="" || password===""){
alert("Please fill all fields");
return;
}

/* get stored user */

let storedEmail = localStorage.getItem("userEmail");

if(email !== storedEmail){
alert("User not found. Please signup first.");
return;
}

/* login success */

localStorage.setItem("isLoggedIn", "true");

/* redirect */

let type = localStorage.getItem("userType") || "mentee";

if(type==="mentor"){
window.location.href = "mentor-dashboard.html";
}else{
window.location.href = "mentors.html";
}

}

</script>

</body>
</html>
