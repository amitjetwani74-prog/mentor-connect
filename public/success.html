<!DOCTYPE html>
<html>
<head>

<title>Booking Confirmed</title>
<link rel="stylesheet" href="css/success.css">

</head>

<body>

<div class="success-page">

<div class="success-card">

<div class="icon">
✔
</div>

<h2>Booking Confirmed!</h2>

<p class="subtitle">
Your mentorship session has been scheduled successfully.
</p>


<div class="mentor-box">

<p class="label">YOUR MENTOR</p>

<h3 id="mentorName"></h3>

<p class="role">Mentorship Session</p>


<div class="details">

<p>
<strong>Date</strong><br>
<span id="sessionDate"></span>
</p>

<p>
<strong>Time</strong><br>
<span id="sessionTime"></span>
</p>

</div>


<div class="meeting">

<strong>Meeting Link</strong>

<p>meet.google.com/mentor-session</p>

</div>

</div>


<button class="calendar-btn">
Add to Calendar
</button>

<button class="dashboard-btn"
onclick="window.location.href='dashboard.html'">
Go to Dashboard
</button>


<p class="support">
Need help? <span>Contact Support</span>
</p>


</div>

</div>



<script>

let mentor = localStorage.getItem("mentorName")
let time = localStorage.getItem("time")

let today = new Date()

let date = today.toDateString()


document.getElementById("mentorName").innerText = mentor
document.getElementById("sessionDate").innerText = date
document.getElementById("sessionTime").innerText = time

</script>


</body>
</html>
