<!DOCTYPE html>
<html>

<head>
<title>Book Session</title>
<link rel="stylesheet" href="css/booking.css">
</head>

<body>

<div class="booking-container">

<h2>Book a Session</h2>

<p class="mentor">
Mentor: <span id="mentor"></span>
</p>

<select id="duration">

<option value="49">30 Minutes</option>
<option value="89">1 Hour</option>

</select>

<button onclick="goToPayment()">
Proceed to Payment
</button>

</div>


<script>

window.onload = function(){

let mentor = localStorage.getItem("mentorName")

document.getElementById("mentor").innerText = mentor

}


function goToPayment(){

let select = document.getElementById("duration")

let price = select.value
let duration = select.options[select.selectedIndex].text

localStorage.setItem("price", price)
localStorage.setItem("duration", duration)

window.location.href = "payment.html"

}

</script>

</body>
</html>
