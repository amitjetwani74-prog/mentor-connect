<!DOCTYPE html>
<html>

<head>

<title>Book Session</title>
<link rel="stylesheet" href="css/booking.css">

</head>

<body>

<div class="booking-container">

<h2>Book a Session</h2>

<p class="mentor">Mentor: Sneha Kapoor</p>

<select id="duration">

<option value="49">30 Minutes - ₹49</option>
<option value="89">1 Hour - ₹89</option>

</select>

<button onclick="goToPayment()">
Proceed to Payment
</button>

</div>


<script>

function goToPayment(){

let price = document.getElementById("duration").value;
let duration = document.getElementById("duration").selectedOptions[0].text;

localStorage.setItem("price", price);
localStorage.setItem("duration", duration);

window.location.href = "payment.html";

}

</script>


</body>

</html>
