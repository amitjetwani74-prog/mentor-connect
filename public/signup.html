<!DOCTYPE html>
<html>
<head>

<title>Create Account - MentorConnect</title>
<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="login-page">

<div class="login-header">

<div class="logo">
<img src="images/logo-icon.png">
<span>MentorConnect</span>
</div>

<a href="login.html" class="support">Already have an account? Log in</a>

</div>


<div class="login-card">

<h2>Create Account</h2>
<p class="subtitle">Join the community and start your journey</p>


<label>Full Name</label>
<input type="text" placeholder="John Doe">


<label>Email Address</label>
<input type="email" placeholder="example@email.com">


<label>I want to...</label>

<div class="account-type">

<div class="type active">
📖 Find a Mentor
</div>

<div class="type">
🎓 Become a Mentor
</div>

</div>


<label>Password</label>
<input type="password" placeholder="••••••••">


<label>Confirm Password</label>
<input type="password" placeholder="••••••••">


<div class="terms">
<input type="checkbox">
<span>By creating an account, you agree to our <b>Terms</b> and <b>Privacy Policy</b>.</span>
</div>


<button class="login-btn">
Create Account →
</button>


<div class="divider">
<span>Or continue with</span>
</div>


<div class="social-login">

<button class="google">
<img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
Google
</button>

<button class="linkedin">
<img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
Facebook
</button>

</div>


<p class="footer-text">
© 2024 MentorConnect. Empowering growth through connection.
</p>


</div>

</div>

</body>
</html>
